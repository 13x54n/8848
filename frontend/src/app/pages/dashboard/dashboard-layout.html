<div class="dashboard-page">
  <aside class="dashboard-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-project">
          <img src="https://avatars.githubusercontent.com/u/179059125?s=200&v=4" alt="Ming Open Web HQ" class="sidebar-project-logo" />
        <span class="sidebar-project-name">Ming Open Web HQ</span>
      </div>
      <button
        type="button"
        class="sidebar-theme-toggle"
        (click)="themeService.toggle()"
        [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        @if (themeService.isDark()) {
          <ng-icon name="lucideSun" class="sidebar-theme-icon" />
        } @else {
          <ng-icon name="lucideMoon" class="sidebar-theme-icon" />
        }
      </button>
    </div>
    <div class="sidebar-search">
      <ng-icon name="lucideSearch" class="sidebar-search-icon" />
      <input type="text" placeholder="Find..." class="sidebar-search-input" />
      <span class="sidebar-kbd">⌘F</span>
    </div>
    <nav class="sidebar-nav">
      @for (item of navItems; track item.path) {
        <a [routerLink]="['/dashboard', item.path]" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" class="sidebar-nav-item">
          <ng-icon [name]="item.icon" class="sidebar-nav-icon" />
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
    <div class="sidebar-footer">
      @if (userAvatarUrl) {
        <img [src]="userAvatarUrl" alt="" class="sidebar-user-avatar" />
      }
      <span class="sidebar-user">{{ projectLabel }}</span>
      <button type="button" class="sidebar-logout" (click)="authService.logout()">Log out</button>
    </div>
  </aside>

  <main class="dashboard-main">
    <router-outlet />
  </main>
</div>
